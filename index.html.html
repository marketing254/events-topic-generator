<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventIQ – Intelligent Topic Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366f1; --primary-light: #a5b4fc;
      --secondary: #06b6d4; --bg: #080f1e; --bg-card: #111827; --bg-card2: #1a2540;
      --border: #1e2d4a; --border-light: #2e3f5c; --text: #f1f5f9; --text-2: #94a3b8;
      --text-3: #4b6282; --success: #10b981; --error: #ef4444; --warn: #f59e0b;
      --gradient: linear-gradient(135deg,#6366f1 0%,#06b6d4 100%);
    }
    html { scroll-behavior: smooth; }
    body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }

    /* ── Header ── */
    .header { position:sticky; top:0; z-index:50; background:rgba(8,15,30,.94); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); padding:13px 24px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .logo-text { font-size:20px; font-weight:800; letter-spacing:-.4px; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .logo-tag  { background:rgba(99,102,241,.18); border:1px solid rgba(99,102,241,.35); border-radius:4px; padding:2px 7px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--primary-light); }
    .header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; }
    .user-pill { background:var(--bg-card2); border:1px solid var(--border-light); border-radius:100px; padding:6px 14px; font-size:13px; display:flex; align-items:center; gap:8px; }
    .dot { width:4px; height:4px; border-radius:50%; background:var(--border-light); }

    /* ── Buttons ── */
    .btn { display:inline-flex; align-items:center; gap:7px; padding:10px 20px; border-radius:8px; border:none; font-size:14px; font-weight:600; cursor:pointer; transition:all .18s; white-space:nowrap; }
    .btn-primary { background:var(--gradient); color:#fff; box-shadow:0 4px 14px rgba(99,102,241,.3); }
    .btn-primary:hover:not(:disabled) { opacity:.88; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .btn-ghost { background:transparent; color:var(--text-2); border:1px solid var(--border-light); }
    .btn-ghost:hover { border-color:var(--primary-light); color:var(--primary-light); }
    .btn-warn  { background:rgba(245,158,11,.15); color:var(--warn); border:1px solid rgba(245,158,11,.3); }
    .btn-warn:hover { background:rgba(245,158,11,.25); }
    .btn-sm { padding:7px 13px; font-size:13px; border-radius:6px; }
    .btn-lg { padding:13px 32px; font-size:16px; border-radius:10px; }

    /* ── Layout ── */
    .main { max-width:1080px; margin:0 auto; padding:36px 22px 80px; }

    /* ── Sign-in ── */
    .signin-wrap { max-width:420px; margin:52px auto 0; }
    .signin-hero { text-align:center; margin-bottom:32px; }
    .signin-hero h1 { font-size:40px; font-weight:900; letter-spacing:-1px; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .signin-hero p { color:var(--text-2); margin-top:10px; font-size:15px; }
    .card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:26px; }
    .card-title { font-size:17px; font-weight:700; margin-bottom:20px; }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:13px; font-weight:600; color:var(--text-2); margin-bottom:6px; }
    .form-control { width:100%; background:var(--bg); border:1px solid var(--border-light); border-radius:8px; padding:11px 13px; color:var(--text); font-size:14px; outline:none; transition:border-color .18s; }
    .form-control:focus { border-color:var(--primary); }
    .form-control::placeholder { color:var(--text-3); }
    select.form-control option { background:var(--bg-card); }
    .err-box { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.4); border-radius:8px; padding:10px 14px; font-size:13px; color:#fca5a5; margin-bottom:14px; }
    .divider { height:1px; background:var(--border); margin:20px 0; }

    /* ── Configure ── */
    .page-title { font-size:25px; font-weight:800; margin-bottom:4px; }
    .page-sub   { color:var(--text-2); font-size:14px; margin-bottom:32px; }
    .sec-label  { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-3); margin-bottom:11px; display:flex; align-items:center; gap:8px; }
    .opt-badge  { background:rgba(245,158,11,.15); border:1px solid rgba(245,158,11,.3); border-radius:4px; padding:2px 7px; font-size:10px; font-weight:700; color:var(--warn); text-transform:uppercase; letter-spacing:.6px; }
    .group-label { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--text); background:var(--bg-card2); border:1px solid var(--border); border-radius:8px; padding:9px 13px; margin-bottom:11px; }
    .config-section { margin-bottom:28px; }
    .grid-sm { display:grid; grid-template-columns:repeat(auto-fill,minmax(146px,1fr)); gap:9px; }
    .grid-3  { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
    .sel-card { background:var(--bg-card); border:2px solid var(--border); border-radius:10px; padding:13px 9px 11px; text-align:center; cursor:pointer; transition:all .18s; font-size:13px; font-weight:500; color:var(--text-2); }
    .sel-card .ic  { font-size:24px; margin-bottom:5px; }
    .sel-card .sub { font-size:11px; color:var(--text-3); margin-top:3px; }
    .sel-card:hover { border-color:var(--primary-light); background:var(--bg-card2); color:var(--text); }
    .sel-card.active { border-color:var(--primary); background:rgba(99,102,241,.12); color:var(--primary-light); box-shadow:0 0 0 3px rgba(99,102,241,.1); }
    .sel-card.skip-card { border-style:dashed; border-color:rgba(245,158,11,.4); color:var(--warn); }
    .sel-card.skip-card:hover { border-color:var(--warn); background:rgba(245,158,11,.08); }
    .sel-card.skip-card.active { border-color:var(--warn); background:rgba(245,158,11,.12); color:var(--warn); box-shadow:0 0 0 3px rgba(245,158,11,.1); }
    .generate-cta { text-align:center; padding:18px 0 4px; }
    .hint { font-size:13px; color:var(--text-3); margin-top:9px; }

    /* ── Steps ── */
    .steps { display:flex; align-items:center; gap:6px; margin-bottom:28px; flex-wrap:wrap; }
    .step-item { display:flex; align-items:center; gap:6px; }
    .step-num { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex-shrink:0; }
    .step-num.done  { background:var(--success); color:#fff; }
    .step-num.now   { background:var(--gradient); color:#fff; box-shadow:0 0 0 3px rgba(99,102,241,.2); }
    .step-num.later { background:var(--border); color:var(--text-3); }
    .step-lbl { font-size:13px; color:var(--text-3); }
    .step-lbl.now { color:var(--text); font-weight:600; }
    .step-arrow { color:var(--border-light); font-size:16px; }

    /* ── Topics ── */
    .actions-row { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:22px; }
    .tag-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:7px; }
    .tag { background:rgba(99,102,241,.12); border:1px solid rgba(99,102,241,.28); border-radius:100px; padding:3px 10px; font-size:12px; font-weight:600; color:var(--primary-light); }
    .tag.green { background:rgba(16,185,129,.12); border-color:rgba(16,185,129,.28); color:#6ee7b7; }
    .tag.amber { background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.28); color:var(--warn); }
    .info-banner { background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.25); border-radius:10px; padding:11px 15px; font-size:13px; color:#6ee7b7; margin-bottom:18px; display:flex; align-items:center; gap:8px; }
    .topic-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:14px; transition:border-color .18s,box-shadow .18s; }
    .topic-card:hover { border-color:var(--border-light); box-shadow:0 5px 22px rgba(0,0,0,.28); }
    .topic-card.claimed { border-color:rgba(16,185,129,.45); background:linear-gradient(135deg,rgba(16,185,129,.04) 0%,var(--bg-card) 100%); }
    .topic-card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
    .topic-num-badge { display:inline-flex; align-items:center; justify-content:center; background:var(--gradient); color:#fff; border-radius:7px; width:27px; height:27px; font-size:12px; font-weight:800; flex-shrink:0; margin-top:1px; }
    .topic-title { font-size:15px; font-weight:700; color:var(--text); display:flex; align-items:flex-start; gap:9px; flex:1; }
    .topic-title-text { flex:1; line-height:1.4; }
    .claimed-pill { display:inline-flex; align-items:center; gap:6px; background:rgba(16,185,129,.12); border:1px solid rgba(16,185,129,.35); border-radius:100px; padding:5px 12px; font-size:12px; font-weight:600; color:#6ee7b7; white-space:nowrap; }
    .takeaways-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text-3); margin-bottom:9px; }
    .takeaways-list { list-style:none; }
    .takeaways-list li { display:flex; align-items:flex-start; gap:9px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:13.5px; color:var(--text-2); line-height:1.5; }
    .takeaways-list li:last-child { border-bottom:none; padding-bottom:0; }
    .t-dot { width:5px; height:5px; border-radius:50%; background:var(--primary-light); flex-shrink:0; margin-top:8px; }

    /* ── Report ── */
    .report-header { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
    .stat-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:28px; }
    .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
    .stat-num  { font-size:28px; font-weight:800; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .stat-lbl  { font-size:12px; color:var(--text-3); margin-top:3px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .filter-row { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
    .filter-row select { background:var(--bg-card); border:1px solid var(--border-light); border-radius:7px; padding:7px 11px; color:var(--text); font-size:13px; outline:none; cursor:pointer; }
    .filter-row select:focus { border-color:var(--primary); }
    .report-table-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { background:var(--bg-card2); padding:11px 14px; text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--text-3); white-space:nowrap; border-bottom:1px solid var(--border); }
    td { padding:12px 14px; border-bottom:1px solid var(--border); color:var(--text-2); vertical-align:top; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,.02); }
    .td-title { color:var(--text); font-weight:500; max-width:320px; }
    .td-badge { display:inline-block; background:rgba(99,102,241,.12); border:1px solid rgba(99,102,241,.25); border-radius:100px; padding:2px 9px; font-size:11px; font-weight:600; color:var(--primary-light); white-space:nowrap; }
    .td-badge.green { background:rgba(16,185,129,.1); border-color:rgba(16,185,129,.25); color:#6ee7b7; }
    .td-badge.amber { background:rgba(245,158,11,.1); border-color:rgba(245,158,11,.25); color:var(--warn); }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-3); }
    .empty-state .big { font-size:40px; margin-bottom:12px; }
    .empty-state p { font-size:15px; }

    /* ── Overlay / Loader ── */
    .overlay { position:fixed; inset:0; background:rgba(8,15,30,.9); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:200; }
    .loader-box { text-align:center; max-width:340px; padding:20px; }
    .spinner { width:50px; height:50px; border-radius:50%; border:3px solid var(--border-light); border-top-color:var(--primary); animation:spin .75s linear infinite; margin:0 auto 18px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loader-title { font-size:17px; font-weight:700; margin-bottom:5px; }
    .loader-sub   { font-size:14px; color:var(--text-2); margin-bottom:18px; }
    .progress-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill  { height:100%; background:var(--gradient); border-radius:2px; animation:prog 1.4s ease-in-out forwards; }
    @keyframes prog { 0%{width:5%} 70%{width:80%} 100%{width:95%} }

    /* ── Toast ── */
    .toast { position:fixed; bottom:22px; right:22px; z-index:300; background:var(--bg-card); border:1px solid var(--success); border-radius:10px; padding:12px 17px; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--success); animation:slideUp .25s ease; box-shadow:0 8px 22px rgba(0,0,0,.4); }
    @keyframes slideUp { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }

    /* ── Confirm dialog ── */
    .confirm-overlay { position:fixed; inset:0; background:rgba(8,15,30,.8); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:300; }
    .confirm-box { background:var(--bg-card); border:1px solid var(--border-light); border-radius:14px; padding:28px; max-width:360px; width:90%; text-align:center; }
    .confirm-box h3 { font-size:17px; font-weight:700; margin-bottom:10px; }
    .confirm-box p  { font-size:14px; color:var(--text-2); margin-bottom:22px; line-height:1.5; }
    .confirm-box .btn-row { display:flex; gap:10px; justify-content:center; }

    /* ── Summit session blocks ── */
    .session-block { margin-bottom:36px; }
    .session-header {
      background: linear-gradient(135deg,rgba(99,102,241,.12) 0%,rgba(6,182,212,.06) 100%);
      border:1px solid rgba(99,102,241,.3); border-radius:14px;
      padding:20px 24px; margin-bottom:14px; position:relative; overflow:hidden;
    }
    .session-header::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
      background:var(--gradient);
    }
    .session-focus-pill {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(99,102,241,.2); border:1px solid rgba(99,102,241,.35);
      border-radius:100px; padding:3px 11px; font-size:11px; font-weight:700;
      color:var(--primary-light); text-transform:uppercase; letter-spacing:.6px; margin-bottom:8px;
    }
    .session-title { font-size:18px; font-weight:800; color:var(--text); line-height:1.3; }
    .session-meta  { font-size:12px; color:var(--text-3); margin-top:5px; font-weight:500; }
    .session-claimed-count {
      display:inline-block; background:rgba(16,185,129,.15);
      border:1px solid rgba(16,185,129,.3); border-radius:100px;
      padding:2px 9px; font-size:11px; font-weight:700; color:#6ee7b7; margin-left:8px;
    }
    .subtopic-card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:11px; padding:20px; margin-bottom:10px;
      transition:border-color .18s, box-shadow .18s;
    }
    .subtopic-card:hover { border-color:var(--border-light); box-shadow:0 4px 18px rgba(0,0,0,.25); }
    .subtopic-card.claimed { border-color:rgba(16,185,129,.4); background:rgba(16,185,129,.03); }
    .subtopic-num {
      display:inline-flex; align-items:center; justify-content:center;
      width:22px; height:22px; border-radius:6px; font-size:11px; font-weight:800;
      background:rgba(99,102,241,.18); color:var(--primary-light); flex-shrink:0; margin-top:1px;
    }
    .subtopic-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
    .subtopic-title-wrap { display:flex; align-items:flex-start; gap:9px; flex:1; }
    .subtopic-title { font-size:14px; font-weight:700; color:var(--text); line-height:1.4; }

    @media(max-width:640px) {
      .grid-sm { grid-template-columns:repeat(2,1fr); }
      .grid-3  { grid-template-columns:repeat(2,1fr); }
      .actions-row { flex-direction:column; }
      .header { padding:12px 16px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>

const S = {
  screen:     'signin',
  name:       '',
  product:    '',
  vertical:   '',
  // Array of selected event focuses.
  // Summit → multi-select (unlimited). Panel/Webinar → max 1.
  // Empty array → "General / No Specific Focus" (legal opt-out only).
  eventTypes: [],
  format:     '',
  topics:     null,   // null | {type:'flat', topics:[]} | {type:'sessions', sessions:[]}
  claimed:    {},
  loading:    false,
  error:      null,
  seed:       0,
  reportFilter: { product: '', vertical: '' },
};

// ═══════════════════════════════════════════════════════
//  TOPIC ENGINE
// ═══════════════════════════════════════════════════════
function shuffle(arr, seed) {
  const a = [...arr];
  let s = (seed >>> 0) || 1;
  for (let i = a.length - 1; i > 0; i--) {
    s = Math.imul(s ^ (s >>> 15), s | 1) ^ Math.imul(s ^ (s >>> 7), s | 61);
    s = (s ^ (s >>> 14)) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateTopics() {
  const legal    = isLegalV(S.vertical);
  const noFocus  = S.eventTypes.length === 0;
  const isSummit = S.format === 'Summit';
  const multiF   = isSummit && S.eventTypes.length > 1;
  const rep      = str => str.replace(/\{V\}/g, S.vertical);
  const seed     = S.seed;

  const getPool = focus => {
    if (!focus) return DB._General_Legal;
    const entry = DB[focus];
    if (!entry) return null;
    return (entry.medical && entry.legal) ? (legal ? entry.legal : entry.medical) : entry;
  };

  const activeFocuses = noFocus ? [''] : S.eventTypes;

  if (multiF) {
    // ── Summit multi-focus: hierarchical sessions ──────────────────────────
    // Each focus area = one session block with 4-5 claimable sub-topics
    let globalIdx = 0;
    return {
      type: 'sessions',
      sessions: activeFocuses.map((focus, fi) => {
        const pool = getPool(focus);
        if (!pool) return null;
        const focusKey    = focus || 'General';
        const sessionTmpl = SESSION_TITLES[focusKey] || `${focusKey} Strategies for {V} Practice Owners`;
        const titles      = shuffle(pool.topics,    seed + fi * 19).slice(0, 5); // 5 sub-topics
        const takeaways   = shuffle(pool.takeaways, seed + fi * 19 + 11);
        return {
          focusArea:    focusKey,
          sessionTitle: rep(sessionTmpl),
          subTopics:    titles.map((title, i) => ({
            globalIdx:  globalIdx++,
            title:      rep(title),
            takeaways:  Array.from({length: 8}, (_, k) => rep(takeaways[(i * 5 + k) % takeaways.length])),
          })),
        };
      }).filter(Boolean),
    };
  } else {
    // ── Flat mode: Panel / Webinar / Summit single-focus ───────────────────
    const focus     = activeFocuses[0];
    const pool      = getPool(focus);
    if (!pool) return { type: 'flat', topics: [] };
    const titles    = shuffle(pool.topics,    seed).slice(0, 8);
    const takeaways = shuffle(pool.takeaways, seed + 7);
    return {
      type:   'flat',
      topics: titles.map((title, i) => ({
        globalIdx:  i,
        focusArea:  focus || 'General',
        title:      rep(title),
        takeaways:  Array.from({length: 8}, (_, k) => rep(takeaways[(i * 5 + k) % takeaways.length])),
      })),
    };
  }
}

//  RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  if (S.screen === 'signin') { root.innerHTML = renderSignin(); return; }
  root.innerHTML = renderHeader() + '<div class="main" id="mc"></div>';
  const mc = document.getElementById('mc');
  if (S.screen === 'configure') mc.innerHTML = renderConfigure();
  if (S.screen === 'topics')    mc.innerHTML = renderTopics();
  if (S.screen === 'report')    mc.innerHTML = renderReport();
  if (S.loading) {
    const ov = document.createElement('div');

}

/* ── Configure ── */

/* ── Topics ── */
function renderTopics() {

  const renderSessions = () => {
    const sessions = S.topics.sessions;
    const totalTopics = sessions.reduce((n, s) => n + s.subTopics.length, 0);
    return sessions.map((session, si) => {
      const focusIcon = (EVENT_TYPES.find(x => x.v === session.focusArea) || {}).ic || '📌';

            </ul>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  };

  // ── Flat mode: Panel / Webinar / Summit single-focus ──────────────────
  const renderFlat = () => {
    const topics = S.topics.topics || [];
    return topics.map((t) => {
      const cl = S.claimed[t.globalIdx];
      return `
      <div class="topic-card ${cl?'claimed':''}">

  return `
  <div class="steps">

// ═══════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════
function pick(field, val) {
  if (field === 'eventType') {
    if (val === '') {
      // "No Specific Focus" — clear all (legal opt-out)
      S.eventTypes = [];
    } else if (S.format === 'Summit') {
      // Summit: toggle the focus on/off in the array
      const already = S.eventTypes.indexOf(val);
      S.eventTypes = already >= 0
        ? S.eventTypes.filter(v => v !== val)
        : [...S.eventTypes, val];
    } else {
      // Panel / Webinar: single-select (click again to deselect)
      S.eventTypes = S.eventTypes[0] === val ? [] : [val];
    }
  } else {
    S[field] = val;
    // Switching format away from Summit → cap to 1 focus
    if (field === 'format' && val !== 'Summit' && S.eventTypes.length > 1) {
      S.eventTypes = [S.eventTypes[0]];
    }
  }
  const mc = document.getElementById('mc');
  if (mc && S.screen === 'configure') mc.innerHTML = renderConfigure();
}

function signIn() {
  const name = (document.getElementById('inName')?.value || '').trim();
  const prod = document.getElementById('inProd')?.value || '';
  if (!name) { S.error = 'Please enter your name.'; render(); return; }
  if (!prod) { S.error = 'Please select your product.'; render(); return; }
  S.name = name; S.product = prod; S.error = null;
  S.screen = 'configure'; render();
}

function signOut() {
  Object.assign(S, { screen:'signin', name:'', product:'', vertical:'', eventTypes:[], format:'', topics:null, claimed:{}, loading:false, error:null, seed:0 });
  render();
}

function backToConfigure() { S.screen = 'configure'; S.topics = null; render(); }
function goReport()         { S.screen = 'report'; render(); }
function backFromReport()   { S.screen = S.topics ? 'topics' : 'configure'; render(); }

function generate() {
  const legal = isLegalV(S.vertical);
  if (!S.vertical || !S.format) return;
  if (S.eventTypes.length === 0 && !legal) return;
  S.seed    = Date.now() ^ (Math.random() * 0xFFFFFF | 0);
  S.claimed = {};
  S.loading = true;
  S.error   = null;
  render();
  setTimeout(() => {
    S.topics  = generateTopics();
    S.loading = false;
    S.screen  = 'topics';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 1100);
}

function claim(globalIdx) {
  if (S.claimed[globalIdx]) return;
  S.claimed[globalIdx] = { name: S.name, product: S.product };

  // Resolve topic title + focusArea from either structure
  let topicTitle = '', focusArea = '';
  if (S.topics?.type === 'sessions') {
    for (const session of S.topics.sessions) {
      const sub = session.subTopics.find(s => s.globalIdx === globalIdx);
      if (sub) { topicTitle = sub.title; focusArea = session.focusArea; break; }
    }
  } else {
    const t = (S.topics?.topics || [])[globalIdx];
    if (t) { topicTitle = t.title; focusArea = t.focusArea; }
  }

  // Persist to localStorage
  const record = {
    id:         Date.now(),
    claimedAt:  new Date().toISOString(),
    name:       S.name,
    product:    S.product,
    vertical:   S.vertical,
    eventType:  focusArea,
    allFocuses: S.eventTypes.join(', ') || 'General',
    format:     S.format,
    topicTitle: topicTitle,
  };
  const existing = loadClaims();
  existing.push(record);
  saveClaims(existing);

  const mc = document.getElementById('mc');
  if (mc) mc.innerHTML = renderTopics();
  // Refresh header badge
  document.querySelector('.header').outerHTML = renderHeader();
  toast(`✅ Topic #${idx+1} claimed for ${S.product}!`);
}

function setFilter(key, val) {
  S.reportFilter[key] = val;
  const mc = document.getElementById('mc');
  if (mc) mc.innerHTML = renderReport();
}

function clearFilters() {
  S.reportFilter = { product: '', vertical: '' };
  const mc = document.getElementById('mc');
  if (mc) mc.innerHTML = renderReport();
}

function confirmClear() {
  const box = document.createElement('div');
  box.className = 'confirm-overlay';
  box.innerHTML = `
    <div class="confirm-box">
      <h3>Clear All Claims Data?</h3>
      <p>This will permanently delete all <strong>${loadClaims().length}</strong> claim records from this browser. This cannot be undone.</p>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button class="btn" style="background:var(--error);color:#fff;" onclick="clearAllData()">Yes, Clear All</button>
      </div>
    </div>`;
  document.body.appendChild(box);
}

function clearAllData() {
  saveClaims([]);
  S.reportFilter = { product: '', vertical: '' };
  document.querySelectorAll('.confirm-overlay').forEach(e => e.remove());
  const mc = document.getElementById('mc');
  if (mc) mc.innerHTML = renderReport();
  toast('🗑️ All claims data cleared.');
}

function toast(msg) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  } catch { return iso; }
}
function esc(s)  { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escQ(s) { return String(s??'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
